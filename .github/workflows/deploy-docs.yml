name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Copy non-docs content into docs/ for MkDocs
        run: |
          cp CHANGELOG.md docs/CHANGELOG.md
          cp -r skills docs/skills
          mkdir -p docs/mcp-server
          cp mcp-server/README.md docs/mcp-server/README.md
          mkdir -p docs/assets
          cp assets/logo.png docs/assets/logo.png
          cp assets/logo-docs.png docs/assets/logo-docs.png
          cp assets/favicon.png docs/assets/favicon.png

      - name: Build site
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
