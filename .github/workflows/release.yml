name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "*.md"
      - "LICENSE"

permissions:
  contents: write

jobs:
  version-and-release:
    name: Bump version, tag, and release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version
        id: current
        run: |
          version=$(python3 -c "import json; print(json.load(open('.cursor-plugin/plugin.json'))['version'])")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Current version: $version"

      - name: Determine bump type from commits
        id: bump
        run: |
          # Get commits since last tag (or all if no tags)
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$last_tag" ]; then
            commits=$(git log --oneline --format="%s")
          else
            commits=$(git log "$last_tag"..HEAD --oneline --format="%s")
          fi

          echo "Commits since last release:"
          echo "$commits"

          bump="patch"
          if echo "$commits" | grep -qiE "^(feat|feature)(\(.+\))?!:|BREAKING CHANGE"; then
            bump="major"
          elif echo "$commits" | grep -qiE "^(feat|feature)(\(.+\))?:"; then
            bump="minor"
          fi

          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "Bump type: $bump"

      - name: Compute new version
        id: new
        run: |
          current="${{ steps.current.outputs.version }}"
          bump="${{ steps.bump.outputs.bump }}"

          IFS='.' read -r major minor patch <<< "$current"

          case "$bump" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          new_version="$major.$minor.$patch"
          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          echo "New version: $new_version"

      - name: Check if version actually changed
        id: check
        run: |
          if [ "${{ steps.current.outputs.version }}" = "${{ steps.new.outputs.version }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version in plugin.json
        if: steps.check.outputs.skip == 'false'
        env:
          NEW_VERSION: ${{ steps.new.outputs.version }}
        run: |
          python3 -c "
          import json, os
          path = '.cursor-plugin/plugin.json'
          new_version = os.environ['NEW_VERSION']
          with open(path) as f:
              data = json.load(f)
          data['version'] = new_version
          with open(path, 'w') as f:
              json.dump(data, f, indent=2)
          print(f'Updated plugin.json to {new_version}')
          "

      - name: Generate release notes from commits
        if: steps.check.outputs.skip == 'false'
        id: notes
        run: |
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          {
            echo "notes<<RELEASE_EOF"
            echo "## What's Changed"
            echo ""

            if [ -z "$last_tag" ]; then
              commits=$(git log --oneline --format="- %s (%h)")
            else
              commits=$(git log "$last_tag"..HEAD --oneline --format="- %s (%h)")
            fi

            # Group by conventional commit type
            features=$(echo "$commits" | grep -iE "^- (feat|feature)" || true)
            fixes=$(echo "$commits" | grep -iE "^- fix" || true)
            others=$(echo "$commits" | grep -viE "^- (feat|feature|fix)" || true)

            if [ -n "$features" ]; then
              echo "### Features"
              echo "$features"
              echo ""
            fi

            if [ -n "$fixes" ]; then
              echo "### Fixes"
              echo "$fixes"
              echo ""
            fi

            if [ -n "$others" ]; then
              echo "### Other"
              echo "$others"
              echo ""
            fi

            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${last_tag:-initial}...v${{ steps.new.outputs.version }}"
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .cursor-plugin/plugin.json
          git commit -m "chore: bump version to ${{ steps.new.outputs.version }} [skip ci]"
          git push

      - name: Create and push tag
        if: steps.check.outputs.skip == 'false'
        run: |
          git tag "v${{ steps.new.outputs.version }}"
          git push origin "v${{ steps.new.outputs.version }}"

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.new.outputs.version }}"
          name: "v${{ steps.new.outputs.version }}"
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
