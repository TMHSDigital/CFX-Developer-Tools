name: Update Documentation Index

on:
  schedule:
    - cron: "0 6 1 * *" # First day of each month at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-docs-index:
    name: Rebuild documentation index
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build docs index
        run: python3 .github/scripts/build_docs_index.py

      - name: Validate index
        run: |
          python3 << 'EOF'
          import json
          data = json.load(open('mcp-server/data/docs_index.json'))
          assert isinstance(data, list), 'Expected array'
          assert len(data) > 50, f'Too few pages: {len(data)}'
          for page in data:
              assert 'title' in page, f'Missing title'
              assert 'url' in page, f'Missing url'
              assert 'section' in page, f'Missing section'
              assert 'snippet' in page, f'Missing snippet'
          print(f'Docs index: {len(data)} pages validated')
          EOF

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet mcp-server/data/docs_index.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to docs index"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            page_count=$(python3 -c "import json; print(len(json.load(open('mcp-server/data/docs_index.json'))))")
            echo "page_count=$page_count" >> "$GITHUB_OUTPUT"
            echo "Docs index updated ($page_count pages)"
          fi

      - name: Commit and push changes
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mcp-server/data/docs_index.json
          git commit -m "chore: update docs index (${{ steps.diff.outputs.page_count }} pages)"
          git push
