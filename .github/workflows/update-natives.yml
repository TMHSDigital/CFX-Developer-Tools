name: Update Native Databases

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-natives:
    name: Fetch and transform native databases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch GTA5 natives from upstream
        run: |
          curl -sfL "https://runtime.fivem.net/doc/natives.json" -o /tmp/gta5_raw.json || { echo "::error::Failed to download GTA5 natives"; exit 1; }
          echo "Downloaded GTA5 natives ($(wc -c < /tmp/gta5_raw.json) bytes)"

      - name: Fetch RDR3 natives from upstream
        run: |
          curl -sfL "https://runtime.fivem.net/doc/natives_rdr3.json" -o /tmp/rdr3_raw.json || { echo "::error::Failed to download RDR3 natives"; exit 1; }
          echo "Downloaded RDR3 natives ($(wc -c < /tmp/rdr3_raw.json) bytes)"

      - name: Fetch CFX platform natives
        run: |
          curl -sfL "https://runtime.fivem.net/doc/natives_cfx.json" -o /tmp/cfx_raw.json || { echo "::error::Failed to download CFX natives"; exit 1; }
          echo "Downloaded CFX natives ($(wc -c < /tmp/cfx_raw.json) bytes)"

      - name: Transform natives to plugin schema
        run: python3 .github/scripts/transform_natives.py

      - name: Validate transformed data
        run: |
          python3 << 'EOF'
          import json

          for game in ['gta5', 'rdr3']:
              path = f'mcp-server/data/natives_{game}.json'
              data = json.load(open(path))
              assert isinstance(data, list), f'{path}: expected array'
              assert len(data) > 0, f'{path}: empty array'
              for n in data:
                  assert 'name' in n, f'{path}: missing name'
                  assert 'hash' in n, f'{path}: missing hash in {n["name"]}'
                  assert 'side' in n, f'{path}: missing side in {n["name"]}'
                  assert 'category' in n, f'{path}: missing category in {n["name"]}'
                  assert 'params' in n, f'{path}: missing params in {n["name"]}'
                  assert isinstance(n.get('deprecated'), bool), f'{path}: deprecated must be bool in {n["name"]}'
              print(f'{game}: {len(data)} natives validated')
          EOF

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet mcp-server/data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to native databases"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            gta5_count=$(python3 -c "import json; print(len(json.load(open('mcp-server/data/natives_gta5.json'))))")
            rdr3_count=$(python3 -c "import json; print(len(json.load(open('mcp-server/data/natives_rdr3.json'))))")
            echo "gta5_count=$gta5_count" >> "$GITHUB_OUTPUT"
            echo "rdr3_count=$rdr3_count" >> "$GITHUB_OUTPUT"
            echo "Native databases updated (GTA5: $gta5_count, RDR3: $rdr3_count)"
          fi

      - name: Commit and push changes
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mcp-server/data/natives_gta5.json mcp-server/data/natives_rdr3.json
          git commit -m "chore: update native databases (GTA5: ${{ steps.diff.outputs.gta5_count }}, RDR3: ${{ steps.diff.outputs.rdr3_count }})"
          git push
